name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  # Job 1: Publish to npm
  publish-npm:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Run tests
        run: npm test
      
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Job 2: Build standalone binaries for multiple platforms
  build-binaries:
    runs-on: ${{ matrix.os }}
    needs: publish-npm
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: tar.gz
          - os: macos-latest
            platform: macos
            arch: x64
            ext: tar.gz
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            ext: zip
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Build binary (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p release
          cp -r dist/*.js release/ 2>/dev/null || true
          cp -r dist/* release/ 2>/dev/null || true
          cp node_modules/ink/build/ release/ink-build/ 2>/dev/null || true
          tar -czvf bincode-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C release .
      
      - name: Build binary (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p release
          cp -r dist/*.js release/ 2>/dev/null || true
          cp -r dist/* release/ 2>/dev/null || true
          cd release && 7z a ../bincode-${{ matrix.platform }}-${{ matrix.arch }}.zip .
      
      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: ./bincode-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.ext }}